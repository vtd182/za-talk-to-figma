name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify-go:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test Go code
        run: make test-go

      - name: Build Go binary
        run: make build-go

  verify-plugin:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install plugin dependencies
        working-directory: plugin
        run: bun install --frozen-lockfile

      - name: Typecheck plugin (strict)
        run: make typecheck-ts

      - name: Test plugin
        run: make test-ts

      - name: Build plugin
        run: make build-ts
